<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Preview — Live SVG Editor & Optimizer</title>
<meta name="description" content="Paste SVG code, see live preview. Optimize size, convert to data URI or CSS background. Free.">
<meta property="og:title" content="SVG Preview — Live SVG Editor & Optimizer">
<meta property="og:description" content="Live SVG preview, optimize, convert to data URI. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/svg-preview/">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:1000px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.editor{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.code-pane{display:flex;flex-direction:column}
.code-pane h3{font-size:0.82rem;color:#888;margin-bottom:6px}
.code-pane textarea{flex:1;min-height:300px;padding:12px;border-radius:10px;border:1px solid #222;background:#0d0d0d;color:#10b981;font-family:'Fira Code',monospace;font-size:0.8rem;outline:none;resize:none;tab-size:2}
.code-pane textarea:focus{border-color:#3b82f6}

.preview-pane h3{font-size:0.82rem;color:#888;margin-bottom:6px;display:flex;justify-content:space-between}
.preview-box{flex:1;min-height:300px;border-radius:10px;border:1px solid #222;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.preview-box.checkerboard{background-image:linear-gradient(45deg,#1a1a1a 25%,transparent 25%),linear-gradient(-45deg,#1a1a1a 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1a1a1a 75%),linear-gradient(-45deg,transparent 75%,#1a1a1a 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px}
.preview-box.white{background:#fff}
.preview-box.dark{background:#0a0a0a}
.preview-box svg{max-width:100%;max-height:100%}

.bg-toggle{display:flex;gap:4px}
.bg-btn{padding:2px 8px;border-radius:4px;border:1px solid #333;background:none;color:#555;font-size:0.68rem;cursor:pointer}
.bg-btn.active{border-color:#3b82f6;color:#4da6ff}

.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:#161616;border:1px solid #222;border-radius:8px;padding:8px 14px;text-align:center}
.stat .num{font-family:'Fira Code',monospace;font-size:1rem;color:#4da6ff}
.stat .lbl{font-size:0.68rem;color:#555;margin-top:2px}

.btn-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #333;background:#161616;color:#888;font-size:0.8rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}

.output{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:12px;margin-bottom:12px;cursor:pointer;display:none}
.output:hover{border-color:#3b82f6}
.output .label{font-size:0.72rem;color:#555;margin-bottom:4px}
.output pre{font-family:'Fira Code',monospace;font-size:0.72rem;color:#888;white-space:pre-wrap;max-height:80px;overflow:auto;word-break:break-all}

.samples{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.sample-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer}
.sample-btn:hover{border-color:#3b82f6;color:#888}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:700px){.editor{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>SVG Preview</h1>
<p class="subtitle">Live SVG editor with optimization and export.</p>

<div class="samples">
  <button class="sample-btn" onclick="loadSample('circle')">Circle</button>
  <button class="sample-btn" onclick="loadSample('star')">Star</button>
  <button class="sample-btn" onclick="loadSample('gradient')">Gradient</button>
  <button class="sample-btn" onclick="loadSample('icon')">Icon</button>
</div>

<div class="editor">
  <div class="code-pane">
    <h3>SVG Code</h3>
    <textarea id="svgCode" oninput="render()" spellcheck="false"></textarea>
  </div>
  <div class="code-pane">
    <h3>
      Preview
      <span class="bg-toggle">
        <button class="bg-btn" onclick="setBg('checkerboard')">▦</button>
        <button class="bg-btn active" onclick="setBg('dark')">⬛</button>
        <button class="bg-btn" onclick="setBg('white')">⬜</button>
      </span>
    </h3>
    <div class="preview-box dark" id="preview"></div>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="btn-row">
  <button class="btn primary" onclick="copySvg()">Copy SVG</button>
  <button class="btn" onclick="showDataUri()">Data URI</button>
  <button class="btn" onclick="showCssBg()">CSS Background</button>
  <button class="btn" onclick="downloadSvg()">Download .svg</button>
  <button class="btn" onclick="downloadPng()">Download .png</button>
</div>

<div class="output" id="dataUriOut" onclick="copyOutput('dataUriPre')">
  <div class="label">Data URI</div>
  <pre id="dataUriPre"></pre>
</div>
<div class="output" id="cssBgOut" onclick="copyOutput('cssBgPre')">
  <div class="label">CSS Background</div>
  <pre id="cssBgPre"></pre>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/svg-preview">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
const SAMPLES={
  circle:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="40" fill="#3b82f6" stroke="#1d4ed8" stroke-width="3"/>
</svg>`,
  star:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <polygon points="50,5 63,35 95,35 69,57 78,90 50,70 22,90 31,57 5,35 37,35" fill="#facc15" stroke="#ca8a04" stroke-width="2"/>
</svg>`,
  gradient:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="15" fill="url(#g1)"/>
</svg>`,
  icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100" height="100" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2L2 7l10 5 10-5-10-5z"/>
  <path d="M2 17l10 5 10-5"/>
  <path d="M2 12l10 5 10-5"/>
</svg>`
};

function loadSample(name){document.getElementById('svgCode').value=SAMPLES[name];render()}

function render(){
  const code=document.getElementById('svgCode').value;
  const preview=document.getElementById('preview');
  // Sanitize: only allow SVG
  if(code.trim().startsWith('<svg')){
    preview.innerHTML=code;
  }else{
    preview.innerHTML='<span style="color:#555;font-size:0.82rem">Paste SVG code to preview</span>';
  }
  updateStats(code);
}

function updateStats(code){
  const bytes=new Blob([code]).size;
  const elements=(code.match(/<[a-z]/gi)||[]).length;
  const hasViewBox=/viewBox/.test(code);
  const hasXmlns=/xmlns/.test(code);
  document.getElementById('stats').innerHTML=[
    {num:formatBytes(bytes),lbl:'Size'},
    {num:elements,lbl:'Elements'},
    {num:hasViewBox?'✓':'✗',lbl:'viewBox'},
    {num:hasXmlns?'✓':'✗',lbl:'xmlns'},
  ].map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

function formatBytes(b){
  if(b<1024)return b+' B';
  return(b/1024).toFixed(1)+' KB';
}

function setBg(type){
  const box=document.getElementById('preview');
  box.className='preview-box '+type;
  document.querySelectorAll('.bg-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function copySvg(){
  navigator.clipboard.writeText(document.getElementById('svgCode').value);
  toast('SVG Copied!');
}

function showDataUri(){
  const code=document.getElementById('svgCode').value;
  const uri='data:image/svg+xml,'+encodeURIComponent(code);
  document.getElementById('dataUriPre').textContent=uri;
  document.getElementById('dataUriOut').style.display='block';
}

function showCssBg(){
  const code=document.getElementById('svgCode').value;
  const uri='data:image/svg+xml,'+encodeURIComponent(code);
  document.getElementById('cssBgPre').textContent=`background-image: url("${uri}");`;
  document.getElementById('cssBgOut').style.display='block';
}

function copyOutput(id){
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  toast('Copied!');
}

function downloadSvg(){
  const blob=new Blob([document.getElementById('svgCode').value],{type:'image/svg+xml'});
  const link=document.createElement('a');
  link.download='image.svg';
  link.href=URL.createObjectURL(blob);
  link.click();
}

function downloadPng(){
  const code=document.getElementById('svgCode').value;
  const blob=new Blob([code],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=function(){
    const canvas=document.createElement('canvas');
    canvas.width=img.naturalWidth||200;
    canvas.height=img.naturalHeight||200;
    canvas.getContext('2d').drawImage(img,0,0);
    const link=document.createElement('a');
    link.download='image.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

loadSample('gradient');
</script>
</body>
</html>
